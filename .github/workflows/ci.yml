name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: codex
          POSTGRES_PASSWORD: codex123
          POSTGRES_DB: codex
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma db push
        env:
          DATABASE_URL: postgresql://codex:codex123@localhost:5432/codex

      - name: Run backend tests
        run: npm run test --workspaces --if-present
        env:
          DATABASE_URL: postgresql://codex:codex123@localhost:5432/codex
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret

  build-api-gateway:
    name: Build API Gateway Image
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile.api -t codex-api-gateway:${{ env.IMAGE_TAG }} .

      - name: Tag and push
        run: |
          docker tag codex-api-gateway:${{ env.IMAGE_TAG }} ${{ env.REGISTRY }}/codex/api-gateway:latest
          docker tag codex-api-gateway:${{ env.IMAGE_TAG }} ${{ env.REGISTRY }}/codex/api-gateway:${{ env.IMAGE_TAG }}
        if: github.ref == 'refs/heads/main'

  build-worker:
    name: Build Worker Image
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile.worker -t codex-worker:${{ env.IMAGE_TAG }} .

      - name: Tag and push
        run: |
          docker tag codex-worker:${{ env.IMAGE_TAG }} ${{ env.REGISTRY }}/codex/worker:latest
          docker tag codex-worker:${{ env.IMAGE_TAG }} ${{ env.REGISTRY }}/codex/worker:${{ env.IMAGE_TAG }}
        if: github.ref == 'refs/heads/main'

  build-ws-gateway:
    name: Build WS Gateway Image
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile.ws -t codex-ws-gateway:${{ env.IMAGE_TAG }} .

      - name: Tag and push
        run: |
          docker tag codex-ws-gateway:${{ env.IMAGE_TAG }} ${{ env.REGISTRY }}/codex/ws-gateway:latest
          docker tag codex-ws-gateway:${{ env.IMAGE_TAG }} ${{ env.REGISTRY }}/codex/ws-gateway:${{ env.IMAGE_TAG }}
        if: github.ref == 'refs/heads/main'

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-api-gateway, build-worker, build-ws-gateway]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          if [ -n "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
            echo "KUBE_CONFIG configured."
          else
            echo "KUBE_CONFIG not set. Skipping deployment later."
          fi

      - name: Deploy to Kubernetes
        run: |
          if [ ! -f "$HOME/.kube/config" ]; then
            echo "No KUBE_CONFIG secret configured. Skipping deployment."
            exit 0
          fi
          kubectl apply --validate=false -f k8s/namespace.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/postgres/
          kubectl apply -f k8s/redis/
          kubectl apply -f k8s/api-gateway/
          kubectl apply -f k8s/worker/
          kubectl apply -f k8s/ws-gateway/
          kubectl apply -f k8s/monitoring/
          kubectl set image deployment/api-gateway api-gateway=${{ env.REGISTRY }}/codex/api-gateway:${{ env.IMAGE_TAG }}
          kubectl set image deployment/worker worker=${{ env.REGISTRY }}/codex/worker:${{ env.IMAGE_TAG }}
          kubectl set image deployment/ws-gateway ws-gateway=${{ env.REGISTRY }}/codex/ws-gateway:${{ env.IMAGE_TAG }}

      - name: Cleanup kubectl config
        if: always()
        run: rm -f $HOME/.kube/config
