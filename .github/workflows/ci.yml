name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: codex
          POSTGRES_PASSWORD: codex123
          POSTGRES_DB: codex
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma db push
        env:
          DATABASE_URL: postgresql://codex:codex123@localhost:5432/codex

      - name: Run backend tests
        run: npm run test --workspaces --if-present
        env:
          DATABASE_URL: postgresql://codex:codex123@localhost:5432/codex
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret

  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - { name: api-gateway, dockerfile: docker/Dockerfile.api }
          - { name: worker,      dockerfile: docker/Dockerfile.worker }
          - { name: ws-gateway,  dockerfile: docker/Dockerfile.ws }
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -f ${{ matrix.service.dockerfile }} \
            -t ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}:latest \
            .

      - name: Push Docker images
        run: |
          docker push ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}:latest

  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.VERCEL_TOKEN != ''
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: |
          vercel deploy \
            --token "${{ secrets.VERCEL_TOKEN }}" \
            --prod \
            --scope "${{ secrets.VERCEL_ORG_ID }}" \
            --confirm
        working-directory: ./frontend
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}

  deploy-backend:
    name: Deploy Backend → VPS
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.VPS_HOST != ''
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            cd /opt/codex

            # Pull latest code
            git fetch origin
            git checkout main
            git pull origin main

            # Update image tags in docker-compose.yml
            export IMAGE_TAG=${{ env.IMAGE_TAG }}

            # Pull new images and restart
            docker compose pull
            docker compose up -d --build --remove-orphans

            # Clean up old images
            docker image prune -f

            # Run migrations
            sleep 3
            docker compose exec -T api-gateway npx prisma migrate deploy || true

      - name: Verify health
        run: |
          sleep 10
          for i in {1..10}; do
            if curl -sf "https://${{ secrets.VPS_HOST }}/health" > /dev/null 2>&1; then
              echo "✓ Health check passed"
              exit 0
            fi
            echo "  Retry $i/10..."
            sleep 3
          done
          echo "✗ Health check failed"
          exit 1
